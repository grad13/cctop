name: Claude Code Assistant

on:
  # Respond to mentions in issues and PRs
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened]
  pull_request:
    types: [opened]
  
  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  claude-assistant:
    runs-on: ubuntu-latest
    # Only run if comment contains @claude or if it's a new issue/PR
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      github.event_name == 'issues' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Claude Code Action
      uses: anthropics/claude-code-action@beta
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        
        # Optional: Specify model (default is claude-3-5-sonnet-20241022)
        # model: claude-3-5-sonnet-20241022
        
        # Optional: Custom instructions
        instructions: |
          You are a helpful assistant for the cctop project.
          When reviewing code or implementing features:
          - Follow TypeScript best practices
          - Ensure changes are compatible with the existing workspace structure
          - Add appropriate tests when implementing new features
          - Update documentation as needed