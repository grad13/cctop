name: Claude Auto Issue Processor

on:
  # Run every hour during working hours (9:00-18:00 JST = 0:00-9:00 UTC)
  schedule:
    - cron: '0 0-9 * * *'
  
  # Also allow manual trigger
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  process-issue:
    runs-on: ubuntu-latest
    
    steps:
    - name: Find and process issue
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          // Get issues with priority labels
          const issues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: 'priority:high,priority:medium,priority:low',
            per_page: 100
          });
          
          // Filter out issues already processed by Claude
          const unprocessedIssues = issues.data.filter(issue => 
            !issue.labels.some(label => label.name === 'claude-processed')
          );
          
          if (unprocessedIssues.length === 0) {
            console.log('No unprocessed issues found');
            return;
          }
          
          // Sort by priority (high > medium > low)
          const priorityOrder = { 'priority:high': 0, 'priority:medium': 1, 'priority:low': 2 };
          unprocessedIssues.sort((a, b) => {
            const aPriority = a.labels.find(l => l.name.startsWith('priority:'))?.name || 'priority:low';
            const bPriority = b.labels.find(l => l.name.startsWith('priority:'))?.name || 'priority:low';
            return priorityOrder[aPriority] - priorityOrder[bPriority];
          });
          
          // Process the highest priority issue
          const issue = unprocessedIssues[0];
          console.log(`Processing issue #${issue.number}: ${issue.title}`);
          
          // Add comment to trigger Claude
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue.number,
            body: `@claude Please analyze this issue and provide:
            1. A summary of what needs to be done
            2. Suggested implementation approach
            3. Any potential challenges or considerations
            
            If this is a bug, please investigate and suggest a fix.
            If this is a feature request, please provide implementation details.`
          });
          
          // Add label to mark as processed
          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue.number,
            labels: ['claude-processed']
          });